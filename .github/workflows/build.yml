name: Build Ganesh APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project Structure
        run: |
          mkdir -p ganesh-app/app/src/main/java/com/example/ganeshplay
          mkdir -p ganesh-app/app/src/main/res/layout
          mkdir -p ganesh-app/app/src/main/res/values
          mkdir -p ganesh-app/app/src/main/res/mipmap-hdpi
          mkdir -p ganesh-app/app/src/main/res/mipmap-mdpi
          mkdir -p ganesh-app/app/src/main/res/mipmap-xhdpi
          mkdir -p ganesh-app/app/src/main/res/mipmap-xxhdpi
          mkdir -p ganesh-app/app/src/main/res/mipmap-xxxhdpi
          mkdir -p ganesh-app/gradle/wrapper

      - name: Download App Icon
        run: |
          curl -L "https://ganeshplay.com/app/img/shri_ganesh_logo.png" \
            -o icon.png
          for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp icon.png ganesh-app/app/src/main/res/mipmap-$dir/ic_launcher.png
            cp icon.png ganesh-app/app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done

      - name: Create MainActivity
        run: |
          cat > ganesh-app/app/src/main/java/com/example/ganeshplay/MainActivity.java << 'JAVAEOF'
          package com.example.ganeshplay;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  webView = findViewById(R.id.webview);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          request.grant(request.getResources());
                      }
                  });
                  if (android.os.Build.VERSION.SDK_INT >= 33) {
                      if (ContextCompat.checkSelfPermission(this,
                              Manifest.permission.POST_NOTIFICATIONS)
                              != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this,
                              new String[]{Manifest.permission.POST_NOTIFICATIONS}, 1);
                      }
                  }
                  webView.loadUrl("https://ganeshplay.com/app/login.php");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVAEOF

      - name: Create Layout XML
        run: |
          cat > ganesh-app/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <WebView
                  android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>
          </RelativeLayout>
          EOF

      - name: Create Resources
        run: |
          cat > ganesh-app/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Shri Ganesh Matka</string>
          </resources>
          EOF

          cat > ganesh-app/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#FF6B00</color>
              <color name="colorPrimaryDark">#E65100</color>
              <color name="colorAccent">#FF6B00</color>
          </resources>
          EOF

          cat > ganesh-app/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
          </resources>
          EOF

      - name: Create AndroidManifest
        run: |
          cat > ganesh-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.ganeshplay">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > ganesh-app/app/google-services.json

      - name: Create app build.gradle
        run: |
          cat > ganesh-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'com.google.gms.google-services'
          }
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.ganeshplay"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              namespace 'com.example.ganeshplay'
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation platform('com.google.firebase:firebase-bom:32.7.0')
              implementation 'com.google.firebase:firebase-messaging'
          }
          EOF

      - name: Create root build.gradle
        run: |
          cat > ganesh-app/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.2'
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Create settings.gradle
        run: |
          cat > ganesh-app/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "GaneshPlay"
          include ':app'
          EOF

      - name: Create Gradle Wrapper Properties
        run: |
          cat > ganesh-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download Gradle Wrapper
        run: |
          cd ganesh-app
          curl -L "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
            -o gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          ./gradle-8.4/bin/gradle wrapper
          chmod +x gradlew

      - name: Build APK
        run: |
          cd ganesh-app
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ganesh-apk
          path: ganesh-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
