name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA
        run: |
          bubblewrap init --manifest=https://ganeshplay.com/manifest.json \
            --directory=./twa-project
        
      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: ganesh-apk
          path: twa-project/app-release-signed.apk
